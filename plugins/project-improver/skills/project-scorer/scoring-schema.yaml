# IDM Software Engineering Quality Scoring Schema
# Based on: IDM Software Engineering Quality Guidelines
#
# OVERALL SCORE (0-100):
#   quality_raw    = (correct*7 + clear*2 + concise*1) / 10
#   usability_raw  = (simple*3 + powerful*2 + performant*2 + documented*2 + accessible*1) / 10
#   safety_raw     = (compliant*6 + reproducible*4) / 10
#   overall_score  = round(quality_raw*40 + usability_raw*40 + safety_raw*20)
#
# N/A metrics (Tier 3: powerful, accessible): omit from JSON; normalize weights within category.
# FAILURE: Set failed=true and score=0 if quality.correct or safety.compliant has a serious violation.

category_weights:
  quality: 0.40
  usability: 0.40
  safety: 0.20

metrics:
  quality:
    correct:  {within_weight: 7, fail_on_serious: true}
    clear:    {within_weight: 2}
    concise:  {within_weight: 1}
  usability:
    simple:      {within_weight: 3}
    powerful:    {within_weight: 2, na_for_tiers: [3]}
    performant:  {within_weight: 2}
    documented:  {within_weight: 2}
    accessible:  {within_weight: 1, na_for_tiers: [3]}
  safety:
    compliant:    {within_weight: 6, fail_on_serious: true}
    reproducible: {within_weight: 4}

# ─── TIER 1: Large-scale project (library/DPG) ───────────────────────────────
tier1:
  quality:
    correct:
      description: "Works correctly with comprehensive test coverage, CI/CD, and no magic numbers"
      rubric:
        0:  "Obvious bugs affecting scientific validity"
        3:  "Appears to work but no tests"
        5:  "Tests present but <60% coverage"
        7:  "Good tests (>80% coverage) but no CI/CD pipeline, or magic numbers present"
        10: "Comprehensive tests with CI/CD; edge cases covered; scientifically validated; no magic numbers"
    clear:
      description: "Sensible modular structure with full docstrings and style guide compliance"
      rubric:
        0:  "No discernible structure, confusing names, unreadable code"
        3:  "Readable but poorly organized"
        5:  "Good structure but sparse comments and docstrings"
        7:  "Good structure and docstrings, occasional style violations"
        10: "Perfect modularity, descriptive names, full docstrings, no style violations, linter clean"
    concise:
      description: "Minimal duplication; fully follows style guide; linter enforced"
      rubric:
        0:  "Severe duplication and pervasive style guide violations"
        3:  "Duplication present, style violations throughout"
        5:  "Some simplifications possible, occasional style violations"
        7:  "Mostly follows style guide, minor issues, linter mostly clean"
        10: "Perfectly concise, style guide compliant, linter clean, no simplifications possible"

  usability:
    simple:
      description: "APIs are easy, intuitive, validated, with helpful error messages"
      rubric:
        0:  "Unclear how to use; no coherent public API"
        3:  "Basic usage possible but many sharp edges and missing defaults"
        5:  "Common workflows work but poor validation and error messages"
        7:  "Clean APIs, validated, good error messages"
        10: "Intuitive, self-documenting, great errors, common workflows are one-liners"
    powerful:
      description: "APIs flexible and adaptable; all assumptions transparent and modifiable"
      rubric:
        0:  "Completely rigid; no flexibility"
        3:  "Minor configuration options only"
        5:  "Most common variations supported"
        7:  "Most use cases covered; classes easily subclassed"
        10: "All assumptions transparent and modifiable; easily subclassed; edge cases handled"
    performant:
      description: "Within 2-5x of native; profiled and optimized; slow tasks parallelizable"
      rubric:
        0:  "10x+ slower than a reasonable implementation"
        3:  "Major algorithmic inefficiencies (wrong data structures, unnecessary loops)"
        5:  "Mostly performant with some minor issues"
        7:  "Well-optimized, within 2-5x of native for typical inputs"
        10: "Profiled, optimized critical paths, no regressions, within 2-5x of native; slow (>30s) tasks can be parallelized"
    documented:
      description: "Readmes in each folder, full docstrings, tutorials, user guide, style guide compliance"
      rubric:
        0:  "No documentation of any kind"
        2:  "Readme only, no docstrings"
        4:  "Readme and some docstrings"
        6:  "Good readme and full public API docstrings, no tutorial"
        8:  "Readmes, full docstrings, at least one tutorial"
        10: "Readmes in each folder, docstrings for every function, tutorials, user guide, and style guide compliance"
    accessible:
      description: "Public repo with all key files, easy installation, community support, AI-optimized"
      rubric:
        0:  "Not publicly available"
        2:  "Public but hard to install or no license"
        5:  "Installable, has license, but missing key files"
        7:  "All key files present (license, changelog), easy installation"
        10: "All files, 1-3 command install, community support, AI-optimized (skills/MCP)"

  safety:
    compliant:
      description: "No legal or security vulnerabilities; all dependencies permissively licensed"
      rubric:
        0:  "FAIL: Exposed API keys, PII, or proprietary data without permission"
        2:  "Restrictive licensed dependencies (GPL/AGPL) in an otherwise permissive project"
        5:  "Missing license file or unclear data usage rights"
        7:  "Fully compliant but missing secondary files (changelog, contributing guide)"
        10: "MIT (or equivalent) license, no secrets, no restrictive deps, all key community files present"
    reproducible:
      description: "Semantic versioning, PyPI/CRAN published, pinned deps, optional lock file"
      rubric:
        0:  "No versioning or dependency management"
        2:  "Git used but no tags or dependency management"
        4:  "Dependencies specified but not published or semantically versioned"
        6:  "Semantic versioning and deps specified but not on PyPI/CRAN"
        8:  "Semantic versioning, PyPI/CRAN published, dependencies pinned (>=)"
        10: "Full stack: semver + git tags, published on PyPI/CRAN, pinned deps, optional lock file, deterministic random seeds"

# ─── TIER 2: Small-scale project ──────────────────────────────────────────────
tier2:
  quality:
    correct:
      description: "Works as intended with basic test coverage"
      rubric:
        0:  "Code is broken or produces scientifically wrong results"
        3:  "Works but has known bugs or edge-case failures"
        5:  "Appears to work but has no tests"
        7:  "Works with basic tests covering main workflows"
        10: "Works with good test coverage including edge cases"
    clear:
      description: "Modular structure if appropriate, some comments"
      rubric:
        0:  "No discernible structure, confusing names"
        3:  "Readable but structured as one large file with no modularization"
        5:  "Some modularization but sparse docstrings/comments"
        7:  "Good modular structure with sufficient comments"
        10: "Well-modular, descriptive names, good docstrings throughout"
    concise:
      description: "No excessive duplication"
      rubric:
        0:  "Extensive duplication; codebase could be 50%+ shorter"
        5:  "Some duplication or clear missed opportunities for library usage"
        10: "No excessive duplication; external libraries used where appropriate"

  usability:
    simple:
      description: "APIs for most common pathways are easy and intuitive"
      rubric:
        0:  "Very unclear how to invoke; no sensible public API"
        3:  "Some API exists but many sharp edges and missing defaults"
        5:  "Works for common cases but requires significant setup"
        7:  "APIs mostly intuitive with sensible defaults"
        10: "Easy, intuitive APIs with validation and helpful error messages"
    powerful:
      description: "Some flexibility is allowed"
      rubric:
        0:  "Completely hardcoded for one use case"
        5:  "Some configurability but key assumptions unexposed"
        10: "Vast majority of use cases met without modifying code"
    performant:
      description: "No obvious/major inefficiencies"
      rubric:
        0:  "Major obvious inefficiencies (Python loops where vectorization is possible, O(n²) where O(n) exists)"
        5:  "Mostly acceptable but some notable inefficiencies"
        10: "No obvious/major inefficiencies for the scale of the problem"
    documented:
      description: "One or more readmes and a tutorial or set of example scripts"
      rubric:
        0:  "No readme and no docstrings"
        3:  "Minimal readme only, no docstrings"
        5:  "Good readme but no tutorial or docstrings"
        7:  "Readme with good docstrings but no tutorial"
        10: "Readme(s), good docstrings, and at least one interactive tutorial"
    accessible:
      description: "Code is open source"
      rubric:
        0:  "Private repo or no public access"
        5:  "Public repo but missing license or basic installation instructions"
        10: "Public repo with MIT license, installable in 1-3 commands"

  safety:
    compliant:
      description: "No legal or security vulnerabilities"
      rubric:
        0:  "FAIL: Exposed secrets, unlicensed data, or proprietary dependency licenses"
        3:  "Restrictive licensed dependencies (e.g., GPL in an otherwise MIT project)"
        5:  "Minor gaps (missing license file, unclear data provenance)"
        7:  "Compliant with minor uncertainties"
        10: "Fully compliant: open license, no secrets, no restrictive dependencies"
    reproducible:
      description: "Different people at different times can get the same results"
      rubric:
        0:  "No version control or dependency documentation"
        3:  "Files versioned but dependencies undocumented"
        5:  "Dependencies specified but without version pins"
        7:  "Dependencies specified with appropriate pins (>=)"
        10: "Pinned deps, documented environment, deterministic seeds where applicable"

# ─── TIER 3: One-off / exploratory ────────────────────────────────────────────
tier3:
  quality:
    correct:
      description: "Works as intended; tested through usage with no formal tests expected"
      rubric:
        0:  "Code is obviously broken or produces scientifically incorrect results"
        5:  "Code appears to work but contains suspicious logic or unverified outputs"
        7:  "Code appears to work as intended and is consistent with its stated purpose"
        10: "Code has been validated through real-world or representative usage"
    clear:
      description: "Author confident it will still make sense to them in 1-3 months"
      rubric:
        0:  "Confusing names or structure; author will struggle to understand it in months"
        5:  "Readable but author may need significant effort to re-orient after time away"
        10: "Author would understand it in 1-3 months with minimal effort"
    concise:
      description: "No egregious code duplication"
      rubric:
        0:  "Large blocks of copy-pasted code with trivial modifications across files"
        5:  "Some obvious duplication that could be easily factored out"
        10: "No egregious duplication"

  usability:
    simple:
      description: "Common workflows are not too painful"
      rubric:
        0:  "Extremely painful to run; requires non-obvious manual setup"
        5:  "Workable but awkward"
        10: "Common workflows run without significant friction"
    powerful:
      description: "N/A — no flexibility expected"
      rubric: "N/A"
    performant:
      description: "Total runtime over project lifetime is less than time to refactor"
      rubric:
        0:  "Total runtime would clearly exceed the time spent optimizing"
        5:  "Borderline: could be faster but probably acceptable given project scope"
        10: "Total runtime over project lifetime is clearly less than time to refactor"
    documented:
      description: "A folder readme"
      rubric:
        0:  "No readme or folder-level documentation"
        5:  "Partial readme missing key sections (purpose, how to run)"
        10: "Clear readme covering purpose, installation, and basic usage"
    accessible:
      description: "N/A — often a private repo"
      rubric: "N/A"

  safety:
    compliant:
      description: "No legal or security vulnerabilities"
      rubric:
        0:  "FAIL: Exposed API keys/secrets, PII in repo, or unlicensed proprietary data"
        3:  "Minor concerns: data files without clear provenance or unclear licensing"
        7:  "Appears compliant with minor uncertainties"
        10: "Fully compliant: no secrets, data used with permission, no restrictive deps"
    reproducible:
      description: "Key files checked into GitHub"
      rubric:
        0:  "Key scripts or data files not in any version control"
        5:  "Most files present but some key assets missing"
        10: "All key files checked in; another person could reproduce the analysis"
